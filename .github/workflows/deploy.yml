name: Deploy to Hostinger VPS

on:
  push:
    branches: [ main ] # Or your primary branch name

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          debug: true
          command_timeout: 30m
          script: |
            set -e
            # Ensure folder exists
            mkdir -p /var/www/unified-platforms
            cd /var/www/unified-platforms
            
            echo "Pulling latest code..."
            if [ -d .git ]; then
              # Re-initialize remote if needed to ensure correct URL
              git remote set-url origin https://github.com/${{ github.repository }} || true
              git pull origin main
            else
              git clone https://github.com/${{ github.repository }} .
            fi

            echo "Installing dependencies..."
            npm install
            
            echo "Building application..."
            npm run build
            
            echo "Starting/Restarting application..."
            # Using tsx to run server.ts directly in production mode
            # Ensure pm2 is installed globally or use local if possible
            pm2 delete unified-platforms || true
            NODE_ENV=production pm2 start server.ts --name "unified-platforms" --interpreter ./node_modules/.bin/tsx -- --port 3000
