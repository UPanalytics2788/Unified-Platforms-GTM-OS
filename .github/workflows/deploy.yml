name: Deploy to Hostinger VPS

on:
  push:
    branches: [ main ] # Or your primary branch name

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -e
            cd /var/www/unified-platforms || exit 1
            git pull origin main
            npm install
            npm run build
            # Ensure PM2 runs the server in production mode
            pm2 delete unified-platforms || true
            NODE_ENV=production pm2 start server.ts --name "unified-platforms" --interpreter ./node_modules/.bin/tsx
